  <main id="main" class="error-page-v2">
    <div class="error-terminal">
      <div class="error-term-bar">
        <span class="error-dot red"></span>
        <span class="error-dot amber"></span>
        <span class="error-dot green"></span>
        <span class="error-term-title">bash — bensec</span>
      </div>
      <div class="error-term-body">
        <p class="error-line">$ <span id="error-cmd" class="error-typewriter"></span><span class="error-cursor">▋</span></p>
        <p class="error-line error-output">bash: <span id="error-path" class="error-path"></span>: command not found</p>
        <p class="error-line"><span class="error-green">root@bensec</span>:<span class="error-blue">~</span>$ <span class="error-dim">kill -9 404</span></p>
        <p class="error-line error-output error-dim">-bash: 404: no such process</p>
        <p class="error-line"><span class="error-green">root@bensec</span>:<span class="error-blue">~</span>$ <span class="error-dim">cd ~</span></p>
      </div>
      <div class="error-404-big">404</div>
      <div class="error-actions">
        <a href="index.html" class="admin-btn success">cd ~</a>
        <a href="blog.html" class="admin-btn">cat blog.html</a>
        <a href="javascript:history.back()" class="admin-btn">↩ back</a>
      </div>
    </div>

  <script src="js/script.js"></script>
  <script src="js/fun-extras.js"></script>
  <script>
    // Typewriter the path that 404'd
    var path = decodeURIComponent(location.pathname.replace(/^\//,'') || 'this-page');
    var cmdEl = document.getElementById('error-cmd');
    var pathEl = document.getElementById('error-path');
    if (pathEl) pathEl.textContent = path;
    if (cmdEl) {
      var str = 'cat ' + path;
      var i = 0;
      var cursor = document.querySelector('.error-cursor');
      function type() {
        cmdEl.textContent = str.slice(0, ++i);
        if (i < str.length) setTimeout(type, 65);
        else { if (cursor) cursor.classList.add('done'); }
      }
      setTimeout(type, 400);
    }
  </script>
  <script src="js/site-features.js"></script>
