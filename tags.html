  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    (function () {
      function escH(s) { return String(s).replace(/[&<>"']/g, function (c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
      function render() {
        var posts = (window.BensecDB && BensecDB.getPosts) ? BensecDB.getPosts() : [];
        posts = posts.filter(function (p) { return p.status !== 'draft'; });

        var tagToPosts = {};
        posts.forEach(function (p) {
          (p.tags || []).forEach(function (t) {
            if (!tagToPosts[t]) tagToPosts[t] = [];
            tagToPosts[t].push(p);
          });
        });
        var tags = Object.keys(tagToPosts).sort(function (a, b) {
          return tagToPosts[b].length - tagToPosts[a].length || a.localeCompare(b);
        });
        var cloud = document.getElementById('tags-cloud');
        var groups = document.getElementById('tags-groups');
        if (!tags.length) { cloud.innerHTML = '<p class="dim">No tags yet.</p>'; return; }
        var max = tagToPosts[tags[0]].length;
        cloud.innerHTML = '<div class="tag-cloud">' + tags.map(function (t) {
          var n = tagToPosts[t].length;
          var size = 0.85 + (n / max) * 0.8; // em
          return '<a class="tag-cloud-item" style="font-size:' + size.toFixed(2) + 'em;" href="#tag-' + encodeURIComponent(t) + '">' +
            '#' + escH(t) + ' <span class="tag-cloud-n">' + n + '</span></a>';
        }).join('') + '</div>';

        groups.innerHTML = tags.map(function (t) {
          return '<section class="tag-group" id="tag-' + escH(t) + '">' +
            '<h2 class="tag-group-title">#' + escH(t) + ' <span class="tag-group-n">' + tagToPosts[t].length + '</span></h2>' +
            '<ul class="archive-list">' +
              tagToPosts[t].sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); }).map(function (p) {
                return '<li><a class="archive-item" href="post.html?id=' + encodeURIComponent(p.id) + '">' +
                  '<span class="archive-date">' + escH(p.date || '—') + '</span>' +
                  '<span class="archive-title">' + escH(p.title || '(untitled)') + '</span>' +
                '</a></li>';
              }).join('') +
            '</ul>' +
          '</section>';
        }).join('');
      }
      function poll(t) {
        t = t || 0;
        if (window.BensecDB && BensecDB.getPosts && BensecDB.getPosts().length) return render();
        if (t > 60) return render();
        setTimeout(function () { poll(t + 1); }, 200);
      }
      document.addEventListener('DOMContentLoaded', function () { poll(); });
    }());
  </script>
  <script src="js/fun-extras.js"></script>
