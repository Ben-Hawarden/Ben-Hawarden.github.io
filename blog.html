  <script>
    // ── Search bar: expand/collapse + "/" shortcut + live count ──
    (function () {
      var bar    = document.getElementById('blog-search-bar');
      var toggle = document.getElementById('blog-search-toggle');
      var input  = document.getElementById('blog-search');
      var count  = document.getElementById('blog-search-count');
      var clear  = document.getElementById('blog-search-clear');
      if (!bar || !input) return;

      function openSearch() {
        bar.classList.add('expanded');
        if (toggle) toggle.setAttribute('aria-expanded', 'true');
        input.focus();
      }
      function closeSearch() {
        input.value = '';
        input.dispatchEvent(new Event('input', { bubbles: true }));
        bar.classList.remove('expanded');
        if (toggle) toggle.setAttribute('aria-expanded', 'false');
        if (count) count.textContent = '';
      }

      if (toggle) toggle.addEventListener('click', openSearch);
      if (clear)  clear.addEventListener('click', closeSearch);

      // "/" key opens search
      document.addEventListener('keydown', function (e) {
        if (e.key === '/' && document.activeElement !== input &&
            !/input|textarea|select/i.test((document.activeElement || {}).tagName || '')) {
          e.preventDefault();
          openSearch();
        } else if (e.key === 'Escape' && bar.classList.contains('expanded')) {
          closeSearch();
        }
      });

      function updateState() {
        var q = (input.value || '').trim();
        bar.classList.toggle('has-query', q.length > 0);
        if (!count) return;
        if (!q) { count.textContent = ''; return; }
        var visible = document.querySelectorAll('#blog-posts .post:not(.search-hidden), .post:not(.search-hidden)').length;
        count.textContent = visible + ' match' + (visible === 1 ? '' : 'es');
      }
      input.addEventListener('input', function () { setTimeout(updateState, 0); });
    }());

    // Tab switching
    document.querySelectorAll('.blog-tab-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.blog-tab-btn').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        var section = btn.dataset.section;
        document.querySelectorAll('.blog-section').forEach(function (s) {
          if (section === 'all') {
            s.style.display = '';
          } else {
            s.style.display = s.id === 'section-' + section ? '' : 'none';
          }
        });
      });
    });
  </script>
