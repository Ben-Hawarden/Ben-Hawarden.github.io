  <script>
    (function () {
      function escH(s) { return String(s).replace(/[&<>"']/g, function (c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
      function render() {
        var posts = (window.BensecDB && BensecDB.getPosts) ? BensecDB.getPosts() : [];
        posts = posts.filter(function (p) { return p.status !== 'draft'; });
        posts.sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); });

        var groups = {};
        posts.forEach(function (p) {
          var y = (p.date || '').slice(0, 4) || '????';
          if (!groups[y]) groups[y] = [];
          groups[y].push(p);
        });
        var years = Object.keys(groups).sort(function (a, b) { return b.localeCompare(a); });
        var host = document.getElementById('archive-list');
        if (!posts.length) { host.innerHTML = '<p class="dim">No posts yet.</p>'; return; }
        host.innerHTML = years.map(function (y) {
          return '<section class="archive-year">' +
            '<h2 class="archive-year-title">' + y + ' <span class="archive-year-count">' + groups[y].length + '</span></h2>' +
            '<ul class="archive-list">' +
              groups[y].map(function (p) {
                return '<li>' +
                  '<a class="archive-item" href="post.html?id=' + encodeURIComponent(p.id) + '">' +
                    '<span class="archive-date">' + escH((p.date || '').slice(5) || '—') + '</span>' +
                    '<span class="archive-title">' + escH(p.title || '(untitled)') + '</span>' +
                    '<span class="archive-tags">' + (p.tags || []).slice(0, 3).map(function (t) { return '#' + escH(t); }).join(' ') + '</span>' +
                  '</a>' +
                '</li>';
              }).join('') +
            '</ul>' +
          '</section>';
        }).join('');
      }
      function poll(t) {
        t = t || 0;
        if (window.BensecDB && BensecDB.getPosts && BensecDB.getPosts().length) return render();
        if (t > 60) return render();
        setTimeout(function () { poll(t + 1); }, 200);
      }
      document.addEventListener('DOMContentLoaded', function () { poll(); });
    }());
  </script>
  <script src="js/fun-extras.js"></script>
